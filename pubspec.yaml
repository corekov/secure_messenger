name: secure_messenger
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cryptography: ^2.9.0
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  flutter_slidable: ^4.0.3
  go_router: ^17.2.3
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1
  uuid: ^4.5.3
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.15.0
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"

flutter_native_splash:
  color: "#121212"
  image: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  android_12:
    color: "#121212"
    image: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
